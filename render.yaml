databases:
  - name: fat-eibl-db
    plan: free
    databaseName: fatdb
    user: fatuser

services:
  - type: web
    name: fat-eibl-backend
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fat-eibl-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_FROM
        value: Audit@edmeinsurance.com

  # === Frontend (React + Vite build) ===
  - type: web
    name: fat-eibl-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: |
      npm install --legacy-peer-deps
      npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        value: https://fat-eibl-backend.onrender.com
